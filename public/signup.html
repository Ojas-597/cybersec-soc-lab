<!DOCTYPE html>
<html>
<head>
  <title>Enterprise SOC Signup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-box">

  <h1>
    📝 SOC Registration
  </h1>

  <p style="text-align:center; color:#94a3b8;">

    Create account for
    Enterprise CyberSec SOC Platform

  </p>

  <br>

  <!-- ================= USERNAME ================= -->

  <input
    type="text"
    id="username"
    placeholder="Username"
    required
  >

  <!-- ================= PASSWORD ================= -->

  <input
    type="password"
    id="password"
    placeholder="Password"
    required
  >

  <!-- ================= ROLE ================= -->

  <select id="role">

    <option value="">
      Select Role
    </option>

    <option value="user">
      👤 User
    </option>

    <option value="analyst">
      🧪 Analyst
    </option>

    <option value="admin">
      👑 Administrator
    </option>

  </select>

  <!-- ================= BUTTON ================= -->

  <button onclick="signup()">

    Create Account

  </button>

  <!-- ================= MESSAGE ================= -->

  <div id="msg"></div>

  <br>

  <p style="text-align:center;">

    Already have account?

    <a href="login.html">
      Login
    </a>

  </p>

</div>

<script>

/* ================= SIGNUP FUNCTION ================= */

async function signup(){

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

const role =
document.getElementById("role").value;

/* ================= VALIDATION ================= */

if(
username.trim() === "" ||
password.trim() === "" ||
role.trim() === ""
){

document.getElementById("msg")
.innerHTML = `

<p style="
color:red;
margin-top:15px;
text-align:center;
">

Please fill all fields

</p>

`;

return;

}

/* PASSWORD LENGTH */

if(password.length < 5){

document.getElementById("msg")
.innerHTML = `

<p style="
color:red;
margin-top:15px;
text-align:center;
">

Password must be at least 5 characters

</p>

`;

return;

}

try{

/* ================= API REQUEST ================= */

const res = await fetch("/signup",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username,
password,
role

})

});

const data = await res.json();

/* ================= ERROR ================= */

if(!res.ok){

document.getElementById("msg")
.innerHTML = `

<p style="
color:red;
margin-top:15px;
text-align:center;
">

${data.error || "Signup failed"}

</p>

`;

return;

}

/* ================= SUCCESS ================= */

document.getElementById("msg")
.innerHTML = `

<p style="
color:lime;
margin-top:15px;
text-align:center;
">

✅ Account created successfully

</p>

`;

/* ================= REDIRECT ================= */

setTimeout(()=>{

window.location.href =
"login.html";

},1500);

}

catch(err){

console.error(err);

document.getElementById("msg")
.innerHTML = `

<p style="
color:red;
margin-top:15px;
text-align:center;
">

⚠ Server error

</p>

`;

}

}

</script>

</body>
</html>
