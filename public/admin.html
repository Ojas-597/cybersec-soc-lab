<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <div class="logo">👑 Admin Panel</div>

  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="logs.html">Logs</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<div class="container">

<h1>Manage Users</h1>

<div class="card">
<table class="table">
<thead>
<tr>
<th>Username</th>
<th>Role</th>
</tr>
</thead>
<tbody id="users"></tbody>
</table>
</div>

</div>

<script>
fetch('/users')
.then(r=>r.json())
.then(data=>{

 let users=document.getElementById('users');

 data.forEach(u=>{

 users.innerHTML += `
 <tr>
   <td>${u.username}</td>
   <td><span class="badge">${u.role}</span></td>
 </tr>
 `;

 })

})
</script>

</body>
</html>
