<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>👑 Admin Panel</h2>

<ul id="users"></ul>

<script>

fetch('/me')
.then(r=>r.json())
.then(u=>{
 if(!u || u.role !== "admin"){
   alert("Access denied");
   window.location="dashboard.html";
 }
});

fetch('/users')
.then(r=>r.json())
.then(data=>{
 let list = document.getElementById("users");

 data.forEach(u=>{
   let li = document.createElement("li");

   li.innerHTML = `
     ${u.username} (${u.role})
     ${u.role !== "admin" ? `<a href="/delete/${u._id}">Delete</a>` : ""}
   `;

   list.appendChild(li);
 });
});

</script>

</body>
</html>
