<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🔐 SOC Login</h1>

  <form action="/login" method="POST">

    <input
      type="text"
      name="username"
      placeholder="Username"
      required
    >

    <input
      type="password"
      name="password"
      placeholder="Password"
      required
    >

    <button type="submit">
      Login
    </button>

  </form>

  <div class="links">
    Don't have account?
    <a href="signup.html">Signup</a>
  </div>

</div>

</body>
</html>
