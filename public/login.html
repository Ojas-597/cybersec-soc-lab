<!DOCTYPE html>
<html>
<head>
  <title>Enterprise SOC Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-box">

  <h1>
    🔐 SOC Login
  </h1>

  <p style="text-align:center; color:#94a3b8;">

    Access the Enterprise
    Security Operations Center

  </p>

  <br>

  <!-- USERNAME -->
  <input
    type="text"
    id="username"
    placeholder="Username"
    required
  >

  <!-- PASSWORD -->
  <input
    type="password"
    id="password"
    placeholder="Password"
    required
  >

  <!-- ROLE -->
  <select id="role">

    <option value="">
      Select Role
    </option>

    <option value="user">
      User
    </option>

    <option value="analyst">
      Analyst
    </option>

    <option value="admin">
      Administrator
    </option>

  </select>

  <button onclick="login()">
    Login
  </button>

  <div id="msg"></div>

  <br>

  <p style="text-align:center;">

    Don't have account?

    <a href="signup.html">
      Signup
    </a>

  </p>

</div>

<script>

/* ================= LOGIN ================= */

async function login(){

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

const role =
document.getElementById("role").value;

/* VALIDATION */
if(
username.trim()==="" ||
password.trim()==="" ||
role.trim()===""
){

document.getElementById("msg")
.innerHTML = `

<p style="color:red; margin-top:15px;">

Please fill all fields

</p>

`;

return;

}

try{

const res = await fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username,
password,
role

})

});

const data = await res.json();

/* LOGIN FAIL */
if(!res.ok){

document.getElementById("msg")
.innerHTML = `

<p style="color:red; margin-top:15px;">

${data.error || "Login failed"}

</p>

`;

return;

}

/* SAVE TOKEN */
localStorage.setItem(
"token",
data.token
);

/* SAVE ROLE */
localStorage.setItem(
"role",
data.role
);

/* SUCCESS */
document.getElementById("msg")
.innerHTML = `

<p style="color:lime; margin-top:15px;">

Login successful

</p>

`;

/* REDIRECT */
setTimeout(()=>{

window.location.href =
"dashboard.html";

},1000);

}

catch(err){

console.error(err);

document.getElementById("msg")
.innerHTML = `

<p style="color:red; margin-top:15px;">

Server error

</p>

`;

}

}

</script>

</body>
</html>
