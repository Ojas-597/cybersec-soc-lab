<!DOCTYPE html>
<html>
<head>
  <title>Upload Evidence</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="card">

<h1>📤 Upload Security Evidence</h1>

<p>
Upload screenshots, logs, or captured evidence
for SOC analysis.
</p>

<form>

<input type="file">

<textarea placeholder="Describe uploaded evidence..."></textarea>

<button type="submit">
Upload Evidence
</button>

</form>

</div>

<div class="card" style="margin-top:20px;">

<h2>🤖 Analysis Result</h2>

<p>
Potential suspicious traffic detected.
Recommended inspection using Wireshark.
</p>

<span class="badge">Medium Risk</span>

</div>

</div>

</body>
</html>
