<!DOCTYPE html>
<html>
<head>

  <title>Search Vulnerabilities</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

  <h1>🔍 Search Vulnerabilities</h1>

  <input
    placeholder="Search vulnerability..."
    id="search"
    onkeyup="searchAttack()"
  >

  <div id="results" class="card-grid"></div>

</div>

<script>

const attacks = [

  {
    name: "SQL Injection",
    severity: "HIGH",
    tool: "SQLmap"
  },

  {
    name: "XSS",
    severity: "MEDIUM",
    tool: "Burp Suite"
  },

  {
    name: "Phishing",
    severity: "HIGH",
    tool: "SET Toolkit"
  },

  {
    name: "Port Scanning",
    severity: "MEDIUM",
    tool: "Nmap"
  },

  {
    name: "Wireshark",
    severity: "LOW",
    tool: "Wireshark"
  },

  {
    name: "Spoofing",
    severity: "HIGH",
    tool: "Ettercap"
  }

];


/* =========================
   SEARCH
========================= */

function searchAttack() {

  let q =
    document.getElementById("search")
    .value
    .toLowerCase();


  let res = attacks.filter(a =>

    a.name.toLowerCase().includes(q)

  );


  document.getElementById("results").innerHTML =

    res.map(r => `

      <div class="card">

        <h3>${r.name}</h3>

        <p>
          Severity:
          <b>${r.severity}</b>
        </p>

        <p>
          Tool:
          ${r.tool}
        </p>

        <br>

        <a href="lab.html?attack=${encodeURIComponent(r.name)}">

          <button>
            Open Lab
          </button>

        </a>

      </div>

    `).join("");

}

</script>

</body>
</html>
