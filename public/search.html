<!DOCTYPE html>
<html>
<head>
  <title>Search Vulnerabilities</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>🔍 Search Vulnerability</h1>

<input placeholder="Search vulnerability..." id="search" onkeyup="search()">

<div id="results" class="card-grid"></div>

</div>

<script>

const attacks = [
  "SQL Injection",
  "XSS",
  "Nmap",
  "Phishing",
  "Wireshark",
  "Spoofing"
];

function search() {

 let q = document.getElementById("search").value;

 let res = attacks.filter(a =>
   a.toLowerCase().includes(q.toLowerCase())
 );

 document.getElementById("results").innerHTML =
 res.map(r => `

 <div class="card">
   <h3>${r}</h3>
   <a href="lab.html?attack=${r}">
     <button>Open Lab</button>
   </a>
 </div>

 `).join("");
}

</script>

</body>
</html>
