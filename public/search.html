<!DOCTYPE html>
<html>
<head>
  <title>Threat Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="card">
<h2>Search Threat DB</h2>
<input id="q">
<button onclick="search()">Search</button>
</div>

<div id="out"></div>

</div>

<script>
function search(){
let q=document.getElementById("q").value;

document.getElementById("out").innerHTML=
`<div class="card">
<h3>${q}</h3>
<p>Threat information loaded from SOC knowledge base</p>
</div>`;
}
</script>

</body>
</html>
