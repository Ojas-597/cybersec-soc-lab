<!DOCTYPE html>
<html>
<head>
  <title>SOC Query Console</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <div class="logo">🤖 SOC Query Console</div>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="lab.html">Lab</a>
    <a href="logs.html">Logs</a>
  </div>
</div>

<div class="container">

<div class="card">
<h2>Enter Threat Query</h2>
<input id="q">
<button onclick="ask()">Analyze</button>
</div>

<div id="out"></div>

</div>

<script>
function ask(){
fetch("/ask",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+localStorage.getItem("token")
},
body:JSON.stringify({question:document.getElementById("q").value})
})
.then(r=>r.json())
.then(d=>{
document.getElementById("out").innerHTML =
d.map(x=>`
<div class="card">
<h3>${x.attack}</h3>
<p>Severity: ${x.severity}</p>
<p>${x.solution}</p>
</div>
`).join("");
});
}
</script>

</body>
</html>
