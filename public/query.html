<!DOCTYPE html>
<html>
<head>
  <title>AI Query Analysis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">

  <div class="logo">
    🤖 AI Security Analysis
  </div>

  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="search.html">Knowledge Base</a>
    <a href="logs.html">Logs</a>
    <a href="/logout">Logout</a>
  </div>

</div>

<div class="container">

  <div class="card">

    <h1>Describe Security Issue</h1>

    <p>
      Enter suspicious activity, attack symptoms,
      or security concerns for AI-based analysis.
    </p>

    <br>

    <input
      id="q"
      placeholder="Example: login bypass vulnerability"
    >

    <button onclick="ask()">
      Analyze Threat
    </button>

  </div>

  <div id="output"></div>

</div>

<script>

function ask(){

 fetch('/ask', {

   method:'POST',

   headers:{
     'Content-Type':'application/json'
   },

   body:JSON.stringify({
     question:document.getElementById('q').value
   })

 })

 .then(r=>r.json())

 .then(d=>{

   document.getElementById('output').innerHTML = `

   <div class="result-box">

   <h2>🚨 Threat Analysis Result</h2>

   <br>

   <h3>Detected Attack</h3>
   <p>${d.attack}</p>

   <br>

   <h3>Recommended Tool</h3>
   <p>${d.tool}</p>

   <br>

   <h3>Suggested Solution</h3>
   <p>${d.solution}</p>

   <br>

   <span class="badge">
     AI Recommendation Generated
   </span>

   </div>

   `;

 })

}

</script>

</body>
</html>
