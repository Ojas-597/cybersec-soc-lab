<!DOCTYPE html>
<html>
<head>
  <title>SOC Query Console</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">

  <div class="logo">
    🤖 SOC Intelligence Console
  </div>

  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="search.html">Search</a>
    <a href="lab.html">Lab</a>
    <a href="report.html">Report</a>
    <a href="logs.html">Logs</a>
    <a href="/logout">Logout</a>
  </div>

</div>

<div class="container">

<div class="card">

  <h1>Threat Intelligence Query</h1>

  <input
    id="q"
    placeholder="Example: SQL injection attack"
  >

  <button onclick="analyze()">
    Analyze Threat
  </button>

</div>

<div id="result"></div>

</div>

<script>

const token = localStorage.getItem("token");

function analyze(){

fetch("/ask",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},

body:JSON.stringify({
question:document.getElementById("q").value
})

})

.then(r=>r.json())

.then(data=>{

document.getElementById("result").innerHTML =

data.map(d=>`

<div class="card">

<h2>${d.attack}</h2>

<p><b>Severity:</b> ${d.severity}</p>

<p><b>Detection Tool:</b> ${d.tool}</p>

<p><b>Solution:</b> ${d.solution}</p>

<p><b>Confidence:</b> ${d.confidence}</p>

</div>

`).join("");

});

}

</script>

</body>
</html>
