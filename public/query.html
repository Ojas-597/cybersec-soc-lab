<!DOCTYPE html>
<html>
<head>
  <title>Ask SOC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>📡 Ask SOC (AI Analysis)</h2>

<input id="q" placeholder="Describe your issue..." style="width:300px;">
<button onclick="ask()">Analyze</button>

<div id="res"></div>

<script>
function ask(){
 fetch('/ask', {
   method: "POST",
   headers: {"Content-Type":"application/json"},
   body: JSON.stringify({
     question: document.getElementById("q").value
   })
 })
 .then(r=>r.json())
 .then(data=>{

   let html = "<h3>🔍 Analysis Result</h3>";

   data.forEach(d => {
     html += `
       <div style="
         border:1px solid white;
         padding:10px;
         margin:10px;
         border-radius:8px;
       ">
         <b>Attack:</b> ${d.attack} <br>
         <b>Confidence:</b> ${d.confidence} <br>
         <b>Tool:</b> ${d.tool} <br>
         <b>Solution:</b> ${d.solution}
       </div>
     `;
   });

   document.getElementById("res").innerHTML = html;
 });
}
</script>

</body>
</html>
