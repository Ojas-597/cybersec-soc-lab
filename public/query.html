<!DOCTYPE html>
<html>
<head>
  <title>SOC AI Threat Console</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">

  <div class="logo">
    🤖 SOC AI Intelligence Console
  </div>

  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="search.html">Knowledge Base</a>
    <a href="lab.html">Lab</a>
    <a href="logs.html">Logs</a>
    <a href="/logout">Logout</a>
  </div>

</div>

<!-- MAIN CONTAINER -->
<div class="container">

  <div class="card">

    <h1>🧠 SOC Threat Intelligence Query Engine</h1>

    <p>
      Enter security incidents, logs, or attack symptoms.
      The system will classify and generate SOC-level analysis.
    </p>

    <br>

    <input
      id="q"
      placeholder="e.g. multiple failed login attempts from same IP"
    >

    <br><br>

    <button onclick="ask()">
      🔍 Analyze Threat
    </button>

  </div>

  <!-- OUTPUT -->
  <div id="output"></div>

</div>

<script>

/* ========================
   AI QUERY ENGINE
======================== */
function ask(){

  let question = document.getElementById("q").value;

  fetch('/ask', {

    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },

    body: JSON.stringify({
      question
    })

  })

  .then(r => r.json())

  .then(data => {

    let html = "";

    data.forEach(d => {

      let severityColor = "green";

      if(d.severity === "HIGH") severityColor = "red";
      if(d.severity === "MEDIUM") severityColor = "orange";
      if(d.severity === "LOW") severityColor = "green";

      html += `
        <div class="card">

          <h2>🚨 SOC Threat Analysis</h2>

          <p><b>Attack Type:</b> ${d.attack}</p>

          <p><b>Severity:</b> 
            <span style="color:${severityColor}">
              ${d.severity}
            </span>
          </p>

          <p><b>Detection Tool:</b> ${d.tool}</p>

          <p><b>Mitigation Strategy:</b> ${d.solution}</p>

          <p><b>Confidence:</b> ${d.confidence || "85%"}</p>

          <span class="badge">
            AI Classified Threat
          </span>

        </div>
      `;
    });

    document.getElementById("output").innerHTML = html;

  });

}

</script>

</body>
</html>
