<!DOCTYPE html>
<html>
<head>

  <title>SOC Logs</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

  <h1>📡 Realtime SOC Logs</h1>

  <table class="table">

    <thead>

      <tr>
        <th>Level</th>
        <th>Message</th>
        <th>Time</th>
      </tr>

    </thead>

    <tbody id="logs"></tbody>

  </table>

</div>


<!-- SOCKET.IO -->
<script src="/socket.io/socket.io.js"></script>

<script>

const logsTable = document.getElementById("logs");


/* =========================
   LOAD EXISTING LOGS
========================= */

fetch('/logs')

.then(r => r.json())

.then(data => {

  logsTable.innerHTML = "";

  data.forEach(addLog);

});


/* =========================
   ADD LOG ROW
========================= */

function addLog(log) {

  logsTable.innerHTML += `

    <tr>

      <td>
        <span class="badge">
          ${log.level}
        </span>
      </td>

      <td>${log.message}</td>

      <td>
        ${new Date(log.time).toLocaleString()}
      </td>

    </tr>

  `;
}


/* =========================
   REALTIME SOCKET
========================= */

const socket = io();

socket.on("new-threat", (data) => {

  addLog({

    level: data.severity,

    message:
      `🚨 ${data.attack} threat detected (${data.confidence})`,

    time: data.time

  });

});

</script>

</body>
</html>
