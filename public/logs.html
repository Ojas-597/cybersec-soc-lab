<!DOCTYPE html>
<html>
<head>
  <title>Logs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="card">
<h1>📜 SOC Logs</h1>
<div id="logs"></div>
</div>

</div>

<script>
fetch("/logs",{headers:{Authorization:"Bearer "+localStorage.getItem("token")}})
.then(r=>r.json())
.then(d=>{
document.getElementById("logs").innerHTML =
d.map(l=>`<div class="card">${l.type} | ${l.severity} | ${l.user}</div>`).join("");
});
</script>

</body>
</html>
