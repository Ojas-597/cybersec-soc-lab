<!DOCTYPE html>
<html>

<head>

  <title>SOC Logs</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

  <h1>📡 SOC Logs</h1>

  <table class="table">

    <thead>

      <tr>

        <th>Level</th>

        <th>Message</th>

        <th>Time</th>

      </tr>

    </thead>

    <tbody id="logs"></tbody>

  </table>

</div>


<script>

const logsTable =
  document.getElementById("logs");


/* =========================
   LOAD LOGS
========================= */

fetch("/logs")

.then(res => {

  if (!res.ok) {

    throw new Error(
      "Failed to fetch logs"
    );

  }

  return res.json();

})

.then(data => {

  logsTable.innerHTML = "";


  if (data.length === 0) {

    logsTable.innerHTML = `

      <tr>

        <td colspan="3">

          No logs found

        </td>

      </tr>

    `;

    return;

  }


  data.forEach(addLog);

})

.catch(err => {

  console.error(err);

  logsTable.innerHTML = `

    <tr>

      <td colspan="3">

        ❌ Failed to load logs

      </td>

    </tr>

  `;

});


/* =========================
   ADD LOG ROW
========================= */

function addLog(log) {

  logsTable.innerHTML += `

    <tr>

      <td>

        <span class="badge">

          ${log.level}

        </span>

      </td>

      <td>

        ${log.message}

      </td>

      <td>

        ${new Date(log.time)
          .toLocaleString()}

      </td>

    </tr>

  `;

}

</script>

</body>
</html>
