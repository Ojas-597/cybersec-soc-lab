<!DOCTYPE html>
<html>
<head>
  <title>SOC Activity Logs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">

  <div class="logo">
    📜 Enterprise SOC Logs
  </div>

  <div class="nav-links">

    <a href="dashboard.html">
      Dashboard
    </a>

    <a href="lab.html">
      Lab
    </a>

    <a href="report.html">
      Reports
    </a>

    <a href="/logout">
      Logout
    </a>

  </div>

</div>

<div class="container">

<h1>
📡 Real-Time SOC Activity Logs
</h1>

<p style="margin-top:10px; color:#64748b;">

Only real user-generated activities
are stored and displayed here.

</p>

<div class="card" style="margin-top:25px;">

<table class="table">

<thead>

<tr>

<th>User</th>
<th>Action</th>
<th>Severity</th>
<th>Time</th>

</tr>

</thead>

<tbody id="logs"></tbody>

</table>

</div>

</div>

<script>

const token =
localStorage.getItem("token");

/* ================= LOAD LOGS ================= */

async function loadLogs(){

try{

const res = await fetch("/logs",{

headers:{
Authorization:"Bearer "+token
}

});

const data = await res.json();

document.getElementById("logs")
.innerHTML = data.map(log=>`

<tr>

<td>
${log.user}
</td>

<td>
${log.action}
</td>

<td>

<span class="badge">

${log.severity}

</span>

</td>

<td>

${new Date(log.createdAt)
.toLocaleString()}

</td>

</tr>

`).join("");

}

catch(err){

console.error(err);

}

}

loadLogs();

/* AUTO REFRESH */

setInterval(loadLogs,5000);

</script>

</body>
</html>
