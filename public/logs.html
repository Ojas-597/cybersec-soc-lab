<!DOCTYPE html>
<html>
<head>
  <title>SOC Logs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>📡 SOC Logs</h1>

<table class="table">

<thead>
<tr>
<th>Level</th>
<th>Message</th>
</tr>
</thead>

<tbody id="logs"></tbody>

</table>

</div>

<script>

fetch('/logs')
.then(r=>r.json())
.then(data=>{

 let logs = document.getElementById('logs');

 data.forEach(l=>{

 logs.innerHTML += `

 <tr>
   <td><span class="badge">${l.level}</span></td>
   <td>${l.message}</td>
 </tr>

 `;

 })

})

</script>

</body>
</html>
