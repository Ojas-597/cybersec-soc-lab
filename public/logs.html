<!DOCTYPE html>
<html>
<head>
  <title>Enterprise SOC Logs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">

  <div class="logo">
    📜 Enterprise SOC Logs
  </div>

  <div class="nav-links">

    <a href="dashboard.html">
      Dashboard
    </a>

    <a href="lab.html">
      Lab
    </a>

    <a href="report.html">
      Reports
    </a>

    <a href="/logout">
      Logout
    </a>

  </div>

</div>

<div class="container">

<h1>
📡 Real-Time SOC Activity Monitoring
</h1>

<p style="margin-top:10px; color:#64748b;">

This section displays real user-generated
SOC activities and incident workflows.

</p>

<div id="logs"></div>

</div>

<script>

const token =
localStorage.getItem("token");

/* ================= LOAD LOGS ================= */

async function loadLogs(){

try{

const res = await fetch("/logs",{

headers:{
Authorization:"Bearer "+token
}

});

const data = await res.json();

document.getElementById("logs")
.innerHTML = data.map(log=>`

<div class="card" style="margin-top:20px;">

<h3>
🚨 SOC Activity
</h3>

<p>

<b>User:</b>

${log.user}

</p>

<p>

<b>Action:</b>

${log.action}

</p>

<p>

<b>Severity:</b>

<span class="badge">

${log.severity}

</span>

</p>

<p>

<b>Timestamp:</b>

${new Date(log.createdAt)
.toLocaleString()}

</p>

</div>

`).join("");

}

catch(err){

console.error(err);

document.getElementById("logs")
.innerHTML = `

<div class="card">

<h3>
❌ Failed to load logs
</h3>

</div>

`;

}

}

/* INITIAL LOAD */
loadLogs();

/* AUTO REFRESH */
setInterval(loadLogs,5000);

</script>

</body>
</html>
