<!DOCTYPE html>
<html>
<head>
  <title>Cyber Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<div class="card">

<h1>🧠 Cybersecurity Quiz</h1>

<h3>
Q: What tool is used for port scanning?
</h3>

<button onclick="check('A')">A) Nmap</button>
<button onclick="check('B')">B) Wireshark</button>

<h2 id="result"></h2>

</div>

</div>

<script>
function check(a){

 if(a==='A'){
   document.getElementById('result').innerText='✔ Correct';
 }
 else{
   document.getElementById('result').innerText='❌ Wrong';
 }

}
</script>

</body>
</html>
