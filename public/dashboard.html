<!DOCTYPE html>
<html>
<head>
  <title>SOC Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <div class="logo">📊 SOC Dashboard</div>

  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="search.html">Search</a>
    <a href="lab.html">Lab</a>
    <a href="query.html">Query</a>
    <a href="report.html">Report</a>
    <a href="quiz.html">Quiz</a>

     <!-- 🔥 ADD UPLOAD (ADMIN ONLY) -->
    <a href="upload.html" id="uploadLink">Upload</a>

    <a href="/logout">Logout</a>
  </div>
</div>

<div class="container">

<h1>🧠 SOC Monitoring Center</h1>

<div class="card-grid">
  <div class="card"><h3>Total</h3><h1 id="t">0</h1></div>
  <div class="card"><h3>High</h3><h1 id="h">0</h1></div>
  <div class="card"><h3>Critical</h3><h1 id="c">0</h1></div>
</div>

<div class="card">
  <h2>🤖 AI Analyzer</h2>
  <input id="q">
  <button onclick="ask()">Analyze</button>
  <div id="res"></div>
</div>

<div class="card">
  <h2>📡 Live SOC Feed</h2>
  <div id="feed"></div>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const token = localStorage.getItem("token");

/* STATS */
function load(){
fetch("/stats",{headers:{Authorization:"Bearer "+token}})
.then(r=>r.json())
.then(d=>{
  document.getElementById("t").innerText=d.total;
  document.getElementById("h").innerText=d.high;
  document.getElementById("c").innerText=d.critical;
});
}
load();
setInterval(load,5000);

/* AI */
function ask(){
fetch("/ask",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({question:document.getElementById("q").value})
})
.then(r=>r.json())
.then(d=>{
document.getElementById("res").innerHTML =
d.map(x=>`<div class="card"><b>${x.attack}</b><p>${x.solution}</p></div>`).join("");
});
}

/* SOCKET */
const socket = io();

socket.on("soc_event", e=>{
document.getElementById("feed").innerHTML =
`<div class="card">${e.type} | ${e.severity} | ${e.user}</div>`
+ document.getElementById("feed").innerHTML;
});

</script>

</body>
</html>
