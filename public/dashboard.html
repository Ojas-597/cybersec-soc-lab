<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <div class="logo">📊 SOC Dashboard</div>

  <div class="nav-links">
    <a href="search.html">Search</a>
    <a href="logs.html">Logs</a>
    <a href="quiz.html">Quiz</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<div class="container">

  <h1>Welcome to SOC Monitoring Center</h1>

  <div class="card-grid">

    <div class="card">
      <h3>Total Incidents</h3>
      <h1>124</h1>
    </div>

    <div class="card">
      <h3>Critical Threats</h3>
      <h1>8</h1>
    </div>

    <div class="card">
      <h3>Network Alerts</h3>
      <h1>52</h1>
    </div>

  </div>

  <div class="result-box">

    <h2>🤖 AI Attack Recommendation System</h2>

    <input id="q" placeholder="Describe security issue...">

    <button onclick="ask()">Analyze Threat</button>

    <div id="res"></div>

  </div>

</div>

<script>
function ask(){

 fetch('/ask', {
   method:'POST',
   headers:{
     'Content-Type':'application/json'
   },
   body:JSON.stringify({
     question:document.getElementById('q').value
   })
 })
 .then(r=>r.json())
 .then(d=>{

   document.getElementById('res').innerHTML=`

   <div class="card">

   <h3>Attack Detected</h3>
   <p><b>${d.attack}</b></p>

   <br>

   <h3>Recommended Tool</h3>
   <p>${d.tool}</p>

   <br>

   <h3>Solution</h3>
   <p>${d.solution}</p>

   </div>

   `;

 })
}
</script>

</body>
</html>
