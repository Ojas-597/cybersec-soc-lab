<!DOCTYPE html>
<html>
<head>
  <title>SOC Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🛡️ CyberSec SOC Dashboard</h1>

<!-- USER INFO -->
<div id="userBox" style="border:1px solid white; padding:10px; margin-bottom:20px;"></div>

<!-- ANALYTICS -->
<div style="border:1px solid white; padding:10px; margin-bottom:20px;">
  <h3>📊 System Analytics</h3>
  <div id="stats"></div>
</div>

<!-- NAVIGATION -->
<div style="border:1px solid white; padding:10px;">
  <h3>🧠 SOC Tools</h3>

  <a href="search.html">🔍 Search Vulnerabilities</a><br><br>

  <a href="lab.html?attack=SQL Injection">🧪 Run Attack Simulation</a><br><br>

  <a href="query.html">📡 Ask SOC (AI Multi Detection)</a><br><br>

  <a href="quiz.html">🧠 Take Quiz</a><br><br>

  <a href="upload.html">📂 Upload Evidence</a><br><br>

  <a href="report.html">📄 View Report</a><br><br>

  <!-- ROLE-BASED LINKS -->
  <div id="adminLinks"></div>

  <br>
  <a href="/logout">🚪 Logout</a>
</div>

<script>

// 👤 USER INFO + ROLE CONTROL
fetch('/me')
.then(r => r.json())
.then(u => {

  if (!u) {
    window.location = "login.html";
    return;
  }

  document.getElementById("userBox").innerHTML = `
    <b>User:</b> ${u.username} <br>
    <b>Role:</b> ${u.role}
  `;

  let links = "";

  // 👑 ADMIN
  if (u.role === "admin") {
    links += `
      <a href="admin.html">👑 Admin Panel</a><br><br>
      <a href="logs.html">📊 View Logs</a><br><br>
    `;
  }

  // 🧪 ANALYST
  if (u.role === "analyst") {
    links += `
      <a href="logs.html">📊 View Logs</a><br><br>
    `;
  }

  document.getElementById("adminLinks").innerHTML = links;
});


// 📊 ANALYTICS
fetch('/stats')
.then(r => r.json())
.then(d => {

  document.getElementById("stats").innerHTML = `
    👥 Total Users: ${d.users} <br>
    📊 Logs Generated: ${d.logs} <br>
    🔥 Top Attack: ${d.topAttack}
  `;
});

</script>

</body>
</html>
