<!DOCTYPE html>
<html>
<head>
  <title>Attack Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <div class="logo">🧪 SOC Lab</div>
  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="lab.html">Lab</a>
  </div>
</div>

<div class="container">

<div class="card">
<h2>Select Attack</h2>

<button onclick="run('sql')">SQL Injection</button>
<button onclick="run('xss')">XSS</button>
<button onclick="run('ddos')">DDoS</button>

</div>

<div id="res"></div>

</div>

<script>
function run(type){
fetch("/lab/run",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+localStorage.getItem("token")
},
body:JSON.stringify({type})
})
.then(r=>r.json())
.then(d=>{
document.getElementById("res").innerHTML =
`<div class="card">
<h3>${d.type}</h3>
<p>${d.severity}</p>
</div>`;
});
}
</script>

</body>
</html>
