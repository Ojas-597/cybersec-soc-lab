<!DOCTYPE html>
<html>
<head>
  <title>Attack Simulation Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">

  <div class="logo">
    🧪 Attack Simulation Lab
  </div>

  <div class="nav-links">
    <a href="dashboard.html">Dashboard</a>
    <a href="search.html">Search</a>
    <a href="quiz.html">Quiz</a>
    <a href="/logout">Logout</a>
  </div>

</div>

<div class="container">

  <div class="card">

    <h1 id="title">Attack Name</h1>

    <br>

    <span class="badge" id="severity">
      High Risk
    </span>

    <br><br>

    <h2>📖 Definition</h2>

    <p id="definition"></p>

    <br>

    <h2>⚙ How It Works</h2>

    <p id="working"></p>

    <br>

    <h2>🌍 Real-World Example</h2>

    <p id="example"></p>

    <br>

    <h2>💻 Simulation Command</h2>

    <pre id="commands"></pre>

    <br>

    <h2>🛡 Prevention</h2>

    <p id="solution"></p>

  </div>

</div>

<script>

const data = {

  "SQL Injection": {

    severity: "Critical",

    definition:
    "SQL Injection is a web attack where malicious SQL queries are inserted into input fields.",

    working:
    "Attackers manipulate backend database queries to bypass authentication or extract data.",

    example:
    "Many websites have suffered database leaks due to weak SQL validation.",

    commands:
    "' OR '1'='1",

    solution:
    "Use prepared statements and input validation."

  },

  "Nmap": {

    severity: "Medium",

    definition:
    "Nmap is a network scanning technique used to discover open ports and services.",

    working:
    "Attackers scan IP ranges to identify vulnerable systems.",

    example:
    "Reconnaissance before penetration testing commonly uses Nmap.",

    commands:
    "nmap -sV 192.168.1.1",

    solution:
    "Close unused ports and configure firewalls."

  },

  "Phishing": {

    severity: "High",

    definition:
    "Phishing attacks trick users into revealing sensitive information.",

    working:
    "Fake emails or websites impersonate trusted organizations.",

    example:
    "Bank phishing attacks commonly steal user credentials.",

    commands:
    "SEToolkit → Social Engineering Attack",

    solution:
    "Conduct user awareness training and email filtering."

  },

  "Wireshark": {

    severity: "Medium",

    definition:
    "Wireshark is used for packet analysis and traffic monitoring.",

    working:
    "Captured packets are analyzed to detect suspicious behavior.",

    example:
    "SOC analysts use packet captures during incident response.",

    commands:
    "wireshark",

    solution:
    "Encrypt traffic and monitor suspicious packets."

  }

};

let attack =
new URLSearchParams(window.location.search)
.get("attack");

document.getElementById("title").innerText = attack;

if(data[attack]){

 document.getElementById("severity")
 .innerText = data[attack].severity;

 document.getElementById("definition")
 .innerText = data[attack].definition;

 document.getElementById("working")
 .innerText = data[attack].working;

 document.getElementById("example")
 .innerText = data[attack].example;

 document.getElementById("commands")
 .innerText = data[attack].commands;

 document.getElementById("solution")
 .innerText = data[attack].solution;

}
else{

 document.getElementById("definition")
 .innerText = "No data available.";

}

</script>

</body>
</html>
